<!DOCTYPE html>
<html lang="ja">
<head>

  <link rel="stylesheet" href="css/style.css">
  <style>
    .page-body {
      max-width: 700px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 3rem;
    }
    .page-title {
      font-size: 1.6rem;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 1.5rem;
      padding-bottom: 0.8rem;
      border-bottom: 2px solid rgba(79, 70, 229, 0.15);
    }
    .page-content p {
      color: #334155;
      font-size: 0.95rem;
      line-height: 1.85;
      margin-bottom: 1rem;
    }
    .back-link {
      display: inline-flex;

      color: #6366f1;
      text-decoration: none;
      font-size: 0.9rem;

    }
    .back-link:hover { text-decoration: underline; }
    .form-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 0.5rem;
      padding: 12px 24px;
      background: linear-gradient(135deg, #4f46e5, #8b5cf6);
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.25s ease;
      box-shadow: 0 4px 14px rgba(79, 70, 229, 0.25);
    }
    .form-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.35);
    }
  </style>
</head>
<body>
  <div class="page-body">
    <a href="index.html" class="back-link">← シミュレーターへ戻る</a>

      <p style="margin-top: 1.5rem;">
